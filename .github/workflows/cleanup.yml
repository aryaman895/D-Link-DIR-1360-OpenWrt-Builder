name: Cleanup Skipped Runs

on:
  workflow_run:
    workflows: ["D-Link DIR 1360 A1 OpenWrt Builder"]
    types:
      - completed

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze logs & decide deletion
        run: |
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"

          echo "Checking run $RUN_ID"

          # Keep failed runs
          if [ "$CONCLUSION" = "failure" ]; then
            echo "Failed run → KEEP"
            exit 0
          fi

          # Wait for logs to be ready (fixes zip errors)
          sleep 15

          # Download logs safely
          gh api repos/$REPO/actions/runs/$RUN_ID/logs > logs.zip || exit 0
          unzip -q logs.zip -d logs || exit 0

          echo "Scanning logs..."

          # Detect real build
          if grep -r "Proceeding with build" logs >/dev/null; then
            echo "Real build detected → KEEP"
            exit 0
          fi

          # Count skip signals (all variants)
          skip_count=$(grep -r -E "Already built → skip|already compiled & exists|No valid release found yet → skipping" logs | wc -l)

          echo "Skip count: $skip_count"

          # You have 4 matrix jobs → expect 4 skips
          if [ "$skip_count" -ge 4 ]; then
            echo "All matrix jobs skipped → DELETE"
            gh api repos/$REPO/actions/runs/$RUN_ID -X DELETE
          else
            echo "Unknown/mixed → KEEP (safe)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Delete old cleanup runs
        run: |
          REPO="${{ github.repository }}"

          gh api repos/$REPO/actions/runs \
            --jq '.workflow_runs[] 
            | select(.name=="Cleanup Skipped Runs") 
            | select(.status=="completed") 
            | "\(.id)"' \
          | while read run_id; do

              if [ "$run_id" != "${{ github.run_id }}" ]; then
                gh api repos/$REPO/actions/runs/$run_id -X DELETE
              fi

          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
