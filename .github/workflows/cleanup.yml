name: Cleanup Skipped Runs

on:
  workflow_run:
    workflows: ["D-Link DIR 1360 A1 OpenWrt Builder"]
    types:
      - completed

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete skipped build run
        run: |
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.event.workflow_run.id }}"

          JOBS_JSON=$(gh api repos/$REPO/actions/runs/$RUN_ID/jobs)

          TOTAL_JOBS=$(echo "$JOBS_JSON" | jq '.jobs | length')

          BUILT_JOBS=0

          for job_id in $(echo "$JOBS_JSON" | jq -r '.jobs[].id'); do
            echo "Checking job $job_id"

            gh api repos/$REPO/actions/jobs/$job_id/logs > job_logs.zip
            unzip -o job_logs.zip -d job_logs_$job_id >/dev/null

            if grep -r -E "make\[[0-9]+\]|Entering directory" job_logs_$job_id; then
              echo "Build detected in job $job_id"
              BUILT_JOBS=$((BUILT_JOBS+1))
            fi
          done

          echo "Total jobs: $TOTAL_JOBS"
          echo "Jobs with actual build: $BUILT_JOBS"

          if [ "$BUILT_JOBS" -eq 0 ]; then
            echo "All jobs skipped → deleting run"
            gh api repos/$REPO/actions/runs/$RUN_ID -X DELETE
          else
            echo "At least one job built → keeping run"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Delete old cleanup runs
        run: |
          REPO="${{ github.repository }}"
          CURRENT_RUN="${{ github.run_id }}"

          gh api repos/$REPO/actions/runs \
            --jq '.workflow_runs[] 
            | select(.name=="Cleanup Skipped Runs") 
            | select(.status=="completed") 
            | .id' \
          | while read run_id; do

              if [ "$run_id" != "$CURRENT_RUN" ]; then
                echo "Deleting old cleanup run $run_id"
                gh api repos/$REPO/actions/runs/$run_id -X DELETE
              else
                echo "Skipping current cleanup run"
              fi

          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
