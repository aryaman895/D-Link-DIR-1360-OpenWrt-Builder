name: D-Link DIR 1360 A1 OpenWrt Builder

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: openwrt-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        branch:
          - "22.03"
          - "23.05"
          - "24.10"
          - "25.12"

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Detect version & decide build
      id: meta
      run: |
        BRANCH="${{ matrix.branch }}"
        echo "Processing branch: $BRANCH"

        TAG_LIST=$(git ls-remote --tags https://github.com/openwrt/openwrt.git | \
          grep "refs/tags/v$BRANCH." | \
          grep -v rc | \
          grep -v "{}" | \
          sed 's#.*/v##' | \
          sort -V)

        VALID_TAG=""

        for t in $TAG_LIST; do
          echo "Checking $t..."

          if curl -sf https://downloads.openwrt.org/releases/$t/targets/ramips/mt7621/config.buildinfo > /dev/null; then
            VALID_TAG=$t
          else
            echo "Skipping $t (not released yet)"
          fi
        done

        if [ -z "$VALID_TAG" ]; then
          echo "No valid release found yet → skipping"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        VERSION="$VALID_TAG"

        echo "Detected version: $VERSION"
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        if gh release view openwrt-$VERSION >/dev/null 2>&1; then
          echo "Already built → skip"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [[ "$BRANCH" == "22.03" ]] && gh release view openwrt-22.03.7 >/dev/null 2>&1; then
          echo "22.03 already compiled & exists"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [[ "$BRANCH" == "23.05" ]] && gh release view openwrt-23.05.5 >/dev/null 2>&1; then
          echo "23.05 already compiled & exists"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Proceeding with build"
        echo "skip=false" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Build Environment
      if: steps.meta.outputs.skip != 'true'
      run: |
        BRANCH="${{ matrix.branch }}"
        TAG="${{ steps.meta.outputs.tag }}"

        sudo apt update
        sudo apt install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3-setuptools rsync unzip zlib1g-dev \
          file wget curl gh ccache

        if [[ "$BRANCH" == "22.03" ]]; then
          sudo apt install -y gcc-11 g++-11
        fi

        git clone https://github.com/openwrt/openwrt.git
        cd openwrt

        echo "Checking out $TAG"
        git checkout $TAG

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Setup ccache
      if: steps.meta.outputs.skip != 'true'
      uses: actions/cache@v4.2.0
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ matrix.branch }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Cache OpenWrt downloads
      if: steps.meta.outputs.skip != 'true'
      uses: actions/cache@v4.2.0
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-dl-${{ matrix.branch }}-${{ steps.meta.outputs.version }}
        restore-keys: |
          ${{ runner.os }}-dl-${{ matrix.branch }}-

    - name: Adding D-Link DIR-1360 A1 Changes
      if: steps.meta.outputs.skip != 'true'
      run: |
        cd openwrt

        BRANCH="${{ matrix.branch }}"
        VERSION="${{ steps.meta.outputs.version }}"


        echo "Applying D-Link DIR-1360 changes for $BRANCH"

        git config --global user.name "OpenWrt Builder"
        git config --global user.email "builder@github.actions"

        if [[ "$BRANCH" == "22.03" ]]; then
          git fetch https://github.com/aryaman895/openwrt openwrt-22.03
          git cherry-pick 7fd1c7acebfe9c30859af41d51249f8635db3dd9 || true

        elif [[ "$BRANCH" == "23.05" ]]; then
          git fetch https://github.com/aryaman895/openwrt openwrt-23.05
          git cherry-pick a137dd5c243143aef7c7d210f5d45333c3d34c3d || true

        elif [[ "$BRANCH" == "24.10" ]]; then
          git fetch https://github.com/aryaman895/openwrt openwrt-24.10
          git cherry-pick c4ddff8959621401e2b053240c1c446d585338d6 || true
        fi

        if [[ "$BRANCH" == "24.10" || "$BRANCH" == "25.12" ]]; then
          mkdir -p package/kernel/mt76/patches
          cp ../patches/999-mt7615-fix-expa-target-power.patch \
             package/kernel/mt76/patches/
        fi

        if [[ "$BRANCH" == "23.05" || "$BRANCH" == "24.10" ]]; then
          mkdir -p target/linux/generic/backport-6.6
          cp ../patches/999-phy-led-deadlock-fix.patch \
             target/linux/generic/backport-6.6/
        fi

        wget https://downloads.openwrt.org/releases/$VERSION/targets/ramips/mt7621/config.buildinfo -O .config

        sed -i 's/CONFIG_TARGET_ALL_PROFILES=y/# CONFIG_TARGET_ALL_PROFILES is not set/' .config

        echo "CONFIG_TARGET_ramips=y" >> .config
        echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
        echo "CONFIG_TARGET_ramips_mt7621_DEVICE_dlink_dir-1360-a1=y" >> .config

        make defconfig

    - name: Build firmware
      if: steps.meta.outputs.skip != 'true'
      run: |
        cd openwrt

        if [[ "${{ matrix.branch }}" == "22.03" ]]; then
          make HOSTCC=gcc-11 HOSTCXX=g++-11 -j$(nproc)
        else
          make -j$(nproc)
        fi

    - name: Upload firmware to Github Release
      if: steps.meta.outputs.skip != 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: openwrt-${{ steps.meta.outputs.version }}
        name: OpenWrt ${{ steps.meta.outputs.version }} D-Link DIR-1360 A1
        files: |
          openwrt/bin/targets/ramips/mt7621/*factory.bin
          openwrt/bin/targets/ramips/mt7621/*sysupgrade.bin
        make_latest: ${{ matrix.branch == '25.12' && 'true' || 'false' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
